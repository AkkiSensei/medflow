# ==========================================
# MedFlow MVP - Server & Database Config
# ==========================================

# Start the server on port 8080
server.port=8080

# --- Database Configuration (H2 In-Memory) ---
spring.datasource.url=jdbc:h2:mem:medflowdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Hibernate / JPA Settings ---
# Automatically create/update the database tables based on our Patient.java class
spring.jpa.hibernate.ddl-auto=validate
# Show the SQL queries in the console for debugging
spring.jpa.show-sql=true
# Format the SQL to make it readable
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway Migrations ---
spring.flyway.enabled=true

# --- H2 Database Console ---
# Allow access to the database UI in your browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console